spring:
  datasource:
    url: ${PERSISTENT_DB_URL:jdbc:h2:file:./data/underwriting;DB_CLOSE_ON_EXIT=FALSE}
    username: ${PERSISTENT_DB_USERNAME:sa}
    password: ${PERSISTENT_DB_PASSWORD:}
    driver-class-name: org.h2.Driver
    hikari:
      pool-name: underwriting-persistent-demo
      maximum-pool-size: 4
      minimum-idle: 1
  sql:
    init:
      mode: always
      schema-locations: classpath:db/persistent-demo-schema.sql
      continue-on-error: false
